name: CodeTruth Quality Gate
description: Block merge when CodeTruth reports critical or high-risk findings
branding:
  icon: shield
  color: blue
inputs:
  api-url:
    description: CodeTruth API base URL (e.g. https://api.codetruth.io)
    required: true
  api-token:
    description: Workspace API token (Bearer) from CodeTruth user settings
    required: true
  workspace-id:
    description: Workspace ID containing the project
    required: true
  project-id:
    description: Project ID to evaluate (use this OR owner+repo)
    required: false
  owner:
    description: GitHub repo owner (with repo)
    required: false
  repo:
    description: GitHub repo name (with owner)
    required: false
  block-severities:
    description: Comma-separated severities that fail the gate
    required: false
    default: Critical blocker,High-risk flaw
  min-overall-score:
    description: Optional minimum overall score (0-100)
    required: false
runs:
  using: composite
  steps:
    - name: Run CodeTruth quality gate
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        API_TOKEN: ${{ inputs.api-token }}
        WORKSPACE_ID: ${{ inputs.workspace-id }}
        PROJECT_ID: ${{ inputs.project-id }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo }}
        BLOCK_SEVERITIES: ${{ inputs.block-severities }}
        MIN_SCORE: ${{ inputs.min-overall-score }}
      run: |
        set -euo pipefail

        if [ -z "$PROJECT_ID" ] && { [ -z "$OWNER" ] || [ -z "$REPO" ]; }; then
          echo "Provide project-id OR owner+repo"
          exit 1
        fi

        QUERY="blockSeverities=$(python3 -c 'import urllib.parse,os; print(urllib.parse.quote(os.environ["BLOCK_SEVERITIES"]))')"
        if [ -n "$MIN_SCORE" ]; then
          QUERY="${QUERY}&minOverallScore=${MIN_SCORE}"
        fi
        if [ -n "$PROJECT_ID" ]; then
          QUERY="${QUERY}&projectId=${PROJECT_ID}"
        else
          QUERY="${QUERY}&owner=${OWNER}&repo=${REPO}"
        fi

        URL="${API_URL%/}/workspaces/${WORKSPACE_ID}/quality-gate?${QUERY}"
        echo "Checking quality gate: $URL"

        HTTP_CODE=$(curl -sS -o /tmp/codetruth-gate.json -w "%{http_code}" \
          -H "Authorization: Bearer ${API_TOKEN}" \
          -H "Accept: application/json" \
          "$URL")

        cat /tmp/codetruth-gate.json
        echo ""

        if [ "$HTTP_CODE" = "200" ]; then
          echo "CodeTruth quality gate passed"
          exit 0
        fi

        if [ "$HTTP_CODE" = "422" ]; then
          echo "CodeTruth quality gate failed — blocking findings detected"
          exit 1
        fi

        echo "Quality gate request failed (HTTP ${HTTP_CODE})"
        exit 1