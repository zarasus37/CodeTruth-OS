# Production-like local stack. Set env in .env before: docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codetruth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codetruth}
      POSTGRES_DB: codetruth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codetruth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4310:4310"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://codetruth:${POSTGRES_PASSWORD:-codetruth}@postgres:5432/codetruth
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://codetruth:${POSTGRES_PASSWORD:-codetruth}@postgres:5432/codetruth
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: